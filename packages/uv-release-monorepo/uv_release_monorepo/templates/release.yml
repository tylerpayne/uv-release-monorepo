# Generated with uv-release-monorepo: https://github.com/tylerpayne/uv-release-monorepo
# From your repository root, regenerate with:
#   uv tool install uv-release-monorepo
#   uvr init
#   uvr init -m PKG runner1 runner2 ...
# Trigger releases with:
#   uvr release
#   uvr release --force-all
#
name: Release Wheels

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Release plan JSON (generated automatically by `uvr release`)."
        type: string
        required: true
      uvr_version:
        description: "uv-release-monorepo version to use (set automatically by `uvr release`)."
        type: string
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).matrix }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Set up
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          uv tool install ${{ inputs.uvr_version && format('uv-release-monorepo=={0}', inputs.uvr_version) || 'uv-release-monorepo' }}
      - name: Build package
        run: |
          uvr-steps execute-build \
            --plan '${{ inputs.plan }}' \
            --package '${{ matrix.package }}'
      - name: Upload built wheels
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.runner }}
          path: dist/*.whl
          if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Set up
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          uv tool install ${{ inputs.uvr_version && format('uv-release-monorepo=={0}', inputs.uvr_version) || 'uv-release-monorepo' }}
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Fetch unchanged wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uvr-steps fetch-unchanged \
            --plan '${{ inputs.plan }}'
      - name: Publish GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uvr-steps publish-releases \
            --plan '${{ inputs.plan }}'
      - name: Finalize release
        run: |
          uvr-steps finalize \
            --plan '${{ inputs.plan }}'
      - name: Push commits and tags
        run: |
          git push
          git push --tags
