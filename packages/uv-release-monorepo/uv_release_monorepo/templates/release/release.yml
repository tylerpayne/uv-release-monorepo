name: Release Wheels
on:
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated by uvr release).
        type: string
        required: true
permissions:
  contents: write
jobs:
  uvr-validate:
    runs-on: ubuntu-latest
    steps:
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: validate-plan
      name: Validate release plan
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs validate
  uvr-build:
    runs-on: ${{ matrix.runner }}
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-build') }}
    needs:
    - uvr-validate
    strategy:
      fail-fast: true
      matrix:
        runner: ${{ fromJSON(inputs.plan).build_matrix }}
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: build
      name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs build --runner '${{ toJSON(matrix.runner) }}'
    - id: upload
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ join(matrix.runner, '-') }}
        path: dist/*.whl
        if-no-files-found: error
  uvr-release:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-release') }}
    needs:
    - uvr-build
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: download
      uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
        run-id: ${{ fromJSON(inputs.plan).reuse_run_id != '' && fromJSON(inputs.plan).reuse_run_id || github.run_id }}
    - id: publish
      name: Tag and publish releases
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs release
  uvr-bump:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-bump') }}
    needs:
    - uvr-release
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: finalize
      name: Finalize release
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs bump
