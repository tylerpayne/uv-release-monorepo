[project]
name = "uv-release-monorepo"
version = "0.10.1.dev0"
description = "Lazy monorepo wheel builder — only rebuilds what changed."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "packaging>=23.0",
    "pydantic>=2.0",
    "ruamel-yaml>=0.18",
    "semver>=3.0",
    "tomlkit>=0.12",
]

[project.scripts]
uv-release-monorepo = "uv_release_monorepo.cli:cli"
uvr = "uv_release_monorepo.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uv_release_monorepo"]
