[project]
name = "uv-release-monorepo"
version = "0.5.1.dev"
description = "Lazy monorepo wheel builder — only rebuilds what changed."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "jinja2>=3.0",
    "packaging>=23.0",
    "pydantic>=2.0",
    "semver>=3.0",
    "tomlkit>=0.12",
]

[project.scripts]
uv-release-monorepo = "uv_release_monorepo.cli:cli"
uvr = "uv_release_monorepo.cli:cli"
uvr-steps = "uv_release_monorepo.workflow_steps:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uv_release_monorepo"]
include = [
    "uv_release_monorepo/templates/release.yml.j2",
]
