[project]
name = "pkg-gamma"
version = "0.1.19.dev0"
description = "Dummy package gamma - depends on beta"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pkg-beta>=0.1.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pkg_gamma"]

[tool.uv.sources]
pkg-beta = { workspace = true }
