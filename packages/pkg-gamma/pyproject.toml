[project]
name = "pkg-gamma"
version = "0.1.21a0"
description = "Dummy package gamma - depends on beta"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "pkg-beta>=0.1.9a0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pkg_gamma"]

[tool.uv.sources]
pkg-beta = { workspace = true }
