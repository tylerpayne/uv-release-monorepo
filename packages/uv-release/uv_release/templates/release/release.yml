name: Release Wheels
on:
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated by uvr release).
        type: string
        required: true
permissions:
  actions: read
  contents: write
  id-token: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: git-config
      name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    - id: validate-plan
      name: Validate release plan
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs validate
  build:
    runs-on: ${{ matrix.runner }}
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'build') }}
    needs:
    - validate
    strategy:
      fail-fast: true
      matrix:
        runner: ${{ fromJSON(inputs.plan).build_matrix }}
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: build
      name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
        UVR_RUNNER: ${{ toJSON(matrix.runner) }}
      run: uv run uvr jobs build
    - id: upload
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ join(matrix.runner, '-') }}
        path: dist/*.whl
        if-no-files-found: error
  release:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'release') }}
    needs:
    - build
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: git-config
      name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    - id: download
      name: Download wheels
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs download
    - id: publish
      name: Tag and publish releases
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs release
  publish:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'publish') }}
    needs:
    - release
    environment: ${{ fromJSON(inputs.plan).publish_environment || null }}
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: download
      name: Download wheels
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs download
    - id: publish
      name: Publish to package index
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs publish
  bump:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'bump') }}
    needs:
    - publish
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: git-config
      name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    - id: finalize
      name: Finalize release
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs bump
