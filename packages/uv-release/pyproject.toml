[project]
name = "uv-release"
version = "0.29.0.dev0"
description = "Lazy monorepo wheel builder."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "packaging>=23.0",
    "pydantic>=2.0",
    "pygit2>=1.19.1",
    "tomlkit>=0.12",
]

[project.scripts]
uvr = "uv_release.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uv_release"]

[tool.pytest.ini_options]
testpaths = ["tests"]
