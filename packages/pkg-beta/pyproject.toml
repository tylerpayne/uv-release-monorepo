[project]
name = "pkg-beta"
version = "0.1.13.dev"
description = "Dummy package beta - depends on alpha"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pkg-alpha>=0.1.8",
]

[build-system]
requires = ["hatchling", "pkg-alpha"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pkg_beta"]
