[project]
name = "pkg-beta"
version = "0.1.8a3"
description = "Dummy package beta - depends on alpha"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "pkg-alpha>=0.1.8a3",
]

[build-system]
requires = ["hatchling", "pkg-alpha"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pkg_beta"]

[tool.uv.sources]
pkg-alpha = { workspace = true }
