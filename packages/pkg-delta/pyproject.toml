[project]
name = "pkg-delta"
version = "0.2.8a1.dev0"
description = "Dummy package delta - depends on alpha (sibling of beta)"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "pkg-alpha>=0.1.9a0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pkg_delta"]

[tool.uv.sources]
pkg-alpha = { workspace = true }
