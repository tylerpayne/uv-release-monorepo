[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
pkg-alpha = { workspace = true }
pkg-beta = { workspace = true }
pkg-gamma = { workspace = true }
pkg-delta = { workspace = true }
uv-release-monorepo = { workspace = true }

[tool.uvr.config]
latest = "uv-release-monorepo"
init_version = "0.18.0"
skill_version = "0.21.8.dev0"
workflow_version = "0.18.2.dev0"

[dependency-groups]
dev = [
    "uv-release-monorepo",
    "ruff>=0.9",
    "ty>=0.0.1a6",
    "poethepoet>=0.32",
    "pytest>=8.0",
    "pre-commit>=4.5.1",
    "pyadr>=0.19.0",
]

[tool.poe.tasks]
format = "ruff format ."
lint = "ruff check ."
lintfix = "ruff check --fix ."
typecheck = "ty check packages/uv-release-monorepo"
check = ["lint", "typecheck"]
fix = ["lintfix", "format"]
test = "pytest packages/uv-release-monorepo/tests/ -v"
all = ["fix", "check", "test"]
