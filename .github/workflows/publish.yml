name: Publish to PyPI

on:
  push:
    tags:
      - 'uv-release-monorepo/v*'
      - '!uv-release-monorepo/v*-dev'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.4.0). Must match an existing GitHub release."
        type: string
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download wheel from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && format('uv-release-monorepo/v{0}', inputs.version) || github.ref_name }}
        run: |
          mkdir dist
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "uv_release_monorepo-*.whl" \
            --dir dist
          ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
