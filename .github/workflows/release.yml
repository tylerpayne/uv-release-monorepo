name: Release Wheels

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Release plan JSON (generated automatically by `uvr release`)."
        type: string
        required: true
      uvr_version:
        description: "uv-release-monorepo version to use (set automatically by `uvr release`)."
        type: string
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(inputs.plan).runners }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          if [ -d packages/uv-release-monorepo ]; then
            uv tool install ./packages/uv-release-monorepo
          elif [ -n '${{ inputs.uvr_version }}' ]; then
            uv tool install 'uv-release-monorepo==${{ inputs.uvr_version }}'
          else
            uv tool install uv-release-monorepo
          fi
      - name: Build packages
        env:
          GH_TOKEN: ${{ github.token }}
          UVR_PLAN: ${{ inputs.plan }}
        run: uvr-steps build-all --plan "$UVR_PLAN" --runner '${{ matrix.runner }}'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runner }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).publish_matrix }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: ${{ matrix.title }}
          body: ${{ matrix.body }}
          files: dist/${{ matrix.dist_name }}-${{ matrix.version }}*.whl
          make_latest: ${{ matrix.make_latest }}

  finalize:
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Set up
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          if [ -d packages/uv-release-monorepo ]; then
            uv tool install ./packages/uv-release-monorepo
          elif [ -n '${{ inputs.uvr_version }}' ]; then
            uv tool install 'uv-release-monorepo==${{ inputs.uvr_version }}'
          else
            uv tool install uv-release-monorepo
          fi
      - name: Finalize release
        env:
          UVR_PLAN: ${{ inputs.plan }}
        run: uvr-steps finalize --plan "$UVR_PLAN"
