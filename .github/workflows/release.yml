name: Release Wheels
on:
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated by uvr release).
        type: string
        required: true
permissions:
  actions: read
  contents: write
  id-token: write
jobs:
  uvr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@v5
      - id: setup-python
        name: Set up Python
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
      - id: validate-plan
        name: Validate release plan
        env:
          UVR_PLAN: ${{ inputs.plan }}
        run: uv run uvr jobs validate
  check:
    needs: [uvr-validate]
    runs-on: ubuntu-latest
    if: ${{ !contains(fromJSON(inputs.plan).skip, 'check') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ fromJSON(inputs.plan).python_version }}
      - name: Lint, typecheck, and test
        run: |
          uv run poe check
          uv run poe test
  
  uvr-build:
    needs: [uvr-validate, check]
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-build') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        runner: ${{ fromJSON(inputs.plan).build_matrix }}
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: build
      name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs build --runner '${{ toJSON(matrix.runner) }}'
    - id: upload
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ join(matrix.runner, '-') }}
        path: dist/*.whl
        if-no-files-found: error
  uvr-release:
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-release') }}
    needs: [uvr-build]
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
    - id: setup-python
      name: Set up Python
      run: |
        uv python install ${{ fromJSON(inputs.plan).python_version }}
    - id: download
      name: Download wheels
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs download
    - id: publish
      name: Tag and publish releases
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs release
  uvr-publish:
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-publish') }}
    needs: [uvr-release]
    runs-on: ubuntu-latest
    environment: ${{ fromJSON(inputs.plan).publish_environment || null }}
    steps:
      - id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@v5
      - id: setup-python
        name: Set up Python
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
      - id: download
        name: Download wheels
        env:
          GH_TOKEN: ${{ github.token }}
          UVR_PLAN: ${{ inputs.plan }}
        run: uv run uvr jobs download
      - id: publish
        name: Publish to package index
        env:
          UVR_PLAN: ${{ inputs.plan }}
        run: uv run uvr jobs publish
  uvr-bump:
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-bump') }}
    needs: [uvr-publish]
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@v5
      - id: setup-python
        name: Set up Python
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
      - id: finalize
        name: Finalize release
        env:
          UVR_PLAN: ${{ inputs.plan }}
        run: uv run uvr jobs bump
