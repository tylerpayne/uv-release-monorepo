name: Release Wheels

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Release plan JSON (generated automatically by `uvr release`)."
        type: string
        required: true
      uvr_version:
        description: "uv-release-monorepo version to use (set automatically by `uvr release`)."
        type: string
        required: false
      skip:
        description: "Comma-separated job names to skip (e.g. 'pre-build,build')."
        type: string
        required: false
        default: ""
      reuse_run_id:
        description: "Download build artifacts from this workflow run instead of building."
        type: string
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
jobs:
  pre-build:
    if: ${{ !contains(inputs.skip, 'pre-build') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Export plan context
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: |
        echo "UVR_CHANGED=$(echo "$UVR_PLAN" | jq -r '.changed | keys | join(" ")')" >> "$GITHUB_ENV"
        echo "UVR_PLAN=$UVR_PLAN" >> "$GITHUB_ENV"
    - id: setup-uv
      name: Set up uv and Python
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: check
      name: Lint, typecheck, and test
      run: |-
        uv sync --all-packages
        uv run poe check
        uv run poe test
  build:
    if: ${{ !contains(inputs.skip, 'build') }}
    needs: [pre-build]
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(inputs.plan).runners }}
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: |
        uv python install ${{ fromJSON(inputs.plan).python_version }}
        uv tool install ${{ inputs.uvr_version && format('uv-release-monorepo=={0}', inputs.uvr_version) || 'uv-release-monorepo' }}
    - name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr-steps build-all --plan "$UVR_PLAN" --runner '${{ matrix.runner }}'
    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.runner }}
        path: dist/*.whl
        if-no-files-found: error

  publish:
    if: ${{ always() && !failure() && !contains(inputs.skip, 'publish') }}
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).publish_matrix }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
        run-id: ${{ inputs.reuse_run_id != '' && inputs.reuse_run_id || github.run_id }}
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ matrix.tag }}
        name: ${{ matrix.title }}
        body: ${{ matrix.body }}
        files: dist/${{ matrix.dist_name }}-${{ matrix.version }}*.whl
        make_latest: ${{ matrix.make_latest }}

  finalize:
    if: ${{ always() && !failure() && !contains(inputs.skip, 'finalize') }}
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up
      run: |
        uv python install ${{ fromJSON(inputs.plan).python_version }}
        uv tool install ${{ inputs.uvr_version && format('uv-release-monorepo=={0}', inputs.uvr_version) || 'uv-release-monorepo' }}
    - name: Finalize release
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr-steps finalize --plan "$UVR_PLAN"

  post-release:
