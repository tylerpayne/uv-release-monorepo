name: Release Wheels
on:
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated by uvr release).
        type: string
        required: true
permissions:
  contents: write
  id-token: write
jobs:
  uvr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@v5
      - id: setup-python
        name: Set up Python
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
      - id: validate-plan
        name: Validate release plan
        env:
          UVR_PLAN: ${{ inputs.plan }}
        run: uv run uvr jobs validate
  check:
    needs: [uvr-validate]
    runs-on: ubuntu-latest
    if: ${{ !contains(fromJSON(inputs.plan).skip, 'check') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ fromJSON(inputs.plan).python_version }}
      - name: Lint, typecheck, and test
        run: |
          uv run poe check
          uv run poe test
  
  uvr-build:
    needs: [uvr-validate]
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-build') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        runner: ${{ fromJSON(inputs.plan).build_matrix }}
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: build
      name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs build --runner '${{ toJSON(matrix.runner) }}'
    - id: upload
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ join(matrix.runner, '-') }}
        path: dist/*.whl
        if-no-files-found: error
  uvr-release:
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-release') }}
    needs: [uvr-build]
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: setup-uv
      uses: astral-sh/setup-uv@v5
    - id: setup-python
      name: Set up Python
      run: |
        uv python install ${{ fromJSON(inputs.plan).python_version }}
    - id: download
      uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
        run-id: ${{ fromJSON(inputs.plan).reuse_run_id != '' && fromJSON(inputs.plan).reuse_run_id || github.run_id }}
    - id: publish
      name: Tag and publish releases
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uv run uvr jobs release
  uvr-bump:
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'uvr-bump') }}
    needs: [uvr-release]
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@v5
      - id: setup-python
        name: Set up Python
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
      - id: finalize
        name: Finalize release
        env:
          UVR_PLAN: ${{ inputs.plan }}
        run: uv run uvr jobs bump
  publish:
    if: ${{ always() && !failure() && !cancelled() && !contains(fromJSON(inputs.plan).skip, 'publish') && fromJSON(inputs.plan).changed['uv-release-monorepo'] != null }}
    needs: [uvr-bump]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download wheel for PyPI
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ fromJSON(inputs.plan).changed['uv-release-monorepo'].release_version }}
        run: |
          mkdir -p dist
          gh release download "uv-release-monorepo/v${VERSION}" --repo "${{ github.repository }}" --pattern "uv_release_monorepo-*.whl" --dir dist
      - uses: pypa/gh-action-pypi-publish@release/v1
