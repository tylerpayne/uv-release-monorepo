name: Release Wheels
'on':
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated automatically by `uvr release`).
        type: string
        required: true
      uvr_version:
        description: uv-release-monorepo version to use (set automatically by `uvr
          release`).
        type: string
        required: false
permissions:
  contents: write
  id-token: write
jobs:
  pre-build:
    runs-on: ubuntu-latest
    needs: []
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Export plan context
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: 'echo "UVR_CHANGED=$(echo "$UVR_PLAN" | jq -r ''.changed | keys | join("
        ")'')" >> "$GITHUB_ENV"

        echo "UVR_PLAN=$UVR_PLAN" >> "$GITHUB_ENV"

        '
    - id: setup-uv
      name: Set up uv and Python
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - id: check
      name: Lint, typecheck, and test
      run: 'uv sync --all-packages

        uv run poe check

        uv run poe test'
  build:
    runs-on: ${{ matrix.runner }}
    needs:
    - pre-build
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: 'uv python install ${{ fromJSON(inputs.plan).python_version }}

        uv tool install ${{ inputs.uvr_version && format(''uv-release-monorepo=={0}'',
        inputs.uvr_version) || ''uv-release-monorepo'' }}

        '
    - name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr-steps build-all --plan "$UVR_PLAN" --runner '${{ matrix.runner }}'
    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.runner }}
        path: dist/*.whl
        if-no-files-found: error
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(inputs.plan).runners }}
  publish:
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ matrix.tag }}
        name: ${{ matrix.title }}
        body: ${{ matrix.body }}
        files: dist/${{ matrix.dist_name }}-${{ matrix.version }}*.whl
        make_latest: ${{ matrix.make_latest }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).publish_matrix }}
  finalize:
    runs-on: ubuntu-latest
    needs:
    - publish
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up
      run: 'uv python install ${{ fromJSON(inputs.plan).python_version }}

        uv tool install ${{ inputs.uvr_version && format(''uv-release-monorepo=={0}'',
        inputs.uvr_version) || ''uv-release-monorepo'' }}

        '
    - name: Finalize release
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr-steps finalize --plan "$UVR_PLAN"
  post-release:
    runs-on: ubuntu-latest
    needs:
    - finalize
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Export plan context
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: 'echo "UVR_CHANGED=$(echo "$UVR_PLAN" | jq -r ''.changed | keys | join("
        ")'')" >> "$GITHUB_ENV"

        echo "UVR_PLAN=$UVR_PLAN" >> "$GITHUB_ENV"

        '
    - id: pypi-download
      name: Download wheel for PyPI
      run: 'VERSION=$(echo "$UVR_PLAN" | python3 -c "import sys,json; p=json.load(sys.stdin);
        print(p[\"changed\"][\"uv-release-monorepo\"][\"version\"])")

        TAG="uv-release-monorepo/v${VERSION}"

        mkdir -p dist

        gh release download "$TAG" --repo "${{ github.repository }}" --pattern "uv_release_monorepo-*.whl"
        --dir dist'
      if: fromJSON(inputs.plan).changed['uv-release-monorepo'] != null
    - id: pypi-publish
      name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      if: fromJSON(inputs.plan).changed['uv-release-monorepo'] != null
    environment: pypi
