        echo "UVR_PLAN=$UVR_PLAN" >> "$GITHUB_ENV"
    - id: pypi-download
      name: Download wheel for PyPI
      run: |-
        VERSION=$(echo "$UVR_PLAN" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[\"changed\"][\"uv-release-monorepo\"][\"version\"])")
