name: Release Wheels
on:
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated by uvr release).
        type: string
        required: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    if: ${{ !contains(fromJSON(inputs.plan).skip, 'build') }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: "uv python install ${{ fromJSON(inputs.plan).python_version }}\nuv tool install ${{ fromJSON(inputs.plan).uvr_install }}"
    - name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr build --plan "$UVR_PLAN" --runner '${{ toJSON(matrix.runner) }}'
    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ join(matrix.runner, '-') }}
        path: dist/*.whl
        if-no-files-found: error
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(inputs.plan).runners }}
  publish:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !contains(fromJSON(inputs.plan).skip, 'publish') }}
    needs:
    - build
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
        run-id: ${{ fromJSON(inputs.plan).reuse_run_id != '' && fromJSON(inputs.plan).reuse_run_id || github.run_id }}
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ matrix.tag }}
        name: ${{ matrix.title }}
        body: ${{ matrix.body }}
        files: dist/${{ matrix.dist_name }}-${{ matrix.version }}*.whl
        make_latest: ${{ matrix.make_latest }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).publish_matrix }}
  finalize:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !contains(fromJSON(inputs.plan).skip, 'finalize') }}
    needs:
    - publish
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: "uv python install ${{ fromJSON(inputs.plan).python_version }}\nuv tool install ${{ fromJSON(inputs.plan).uvr_install }}"
    - name: Finalize release
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr finalize --plan "$UVR_PLAN"
