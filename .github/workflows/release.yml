name: Release Wheels
on:
  workflow_dispatch:
    inputs:
      plan:
        description: Release plan JSON (generated by uvr release).
        type: string
        required: true
permissions:
  contents: write
  id-token: write
jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ !contains(fromJSON(inputs.plan).skip, 'check') }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ fromJSON(inputs.plan).python_version }}
    - name: Lint, typecheck, and test
      run: |
        uv sync --all-packages
        uv run poe check
        uv run poe test
  build:
    runs-on: ${{ matrix.runner }}
    if: ${{ !contains(fromJSON(inputs.plan).skip, 'build') }}
    needs:
    - check
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: |
        uv python install ${{ fromJSON(inputs.plan).python_version }}
        uv tool install ./packages/uv-release-monorepo
    - name: Build packages
      env:
        GH_TOKEN: ${{ github.token }}
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr build --plan "$UVR_PLAN" --runner '${{ toJSON(matrix.runner) }}'
    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ join(matrix.runner, '-') }}
        path: dist/*.whl
        if-no-files-found: error
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(inputs.plan).runners }}
  
  release:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !contains(fromJSON(inputs.plan).skip, 'publish') }}
    needs:
    - build
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).publish_matrix }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
        run-id: ${{ fromJSON(inputs.plan).reuse_run_id != '' && fromJSON(inputs.plan).reuse_run_id || github.run_id }}
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ matrix.tag }}
        name: ${{ matrix.title }}
        body: ${{ matrix.body }}
        files: dist/${{ matrix.dist_name }}-${{ matrix.version }}*.whl
        make_latest: ${{ matrix.make_latest }}
  finalize:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !contains(fromJSON(inputs.plan).skip, 'finalize') }}
    needs:
    - release
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: |
        uv python install ${{ fromJSON(inputs.plan).python_version }}
        uv tool install ./packages/uv-release-monorepo
    - name: Finalize release
      env:
        UVR_PLAN: ${{ inputs.plan }}
      run: uvr finalize --plan "$UVR_PLAN"
  publish:
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !contains(fromJSON(inputs.plan).skip, 'post-release') }}
    needs:
    - finalize
    environment: pypi
    steps:
    - name: Download wheel for PyPI
      if: fromJSON(inputs.plan).changed['uv-release-monorepo'] != null
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ fromJSON(inputs.plan).changed['uv-release-monorepo'].version }}
      run: |
        mkdir -p dist
        gh release download "uv-release-monorepo/v${VERSION}" --repo "${{ github.repository }}" --pattern "uv_release_monorepo-*.whl" --dir dist
    - uses: pypa/gh-action-pypi-publish@release/v1
      if: fromJSON(inputs.plan).changed['uv-release-monorepo'] != null
