name: Release Wheels

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Release plan JSON (generated automatically by `uvr release`)."
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(fromJSON(inputs.plan).skip, 'build') }}
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(inputs.plan).runners }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          uv tool install ${{ fromJSON(inputs.plan).uvr_version != '' && format('uv-release-monorepo=={0}', fromJSON(inputs.plan).uvr_version) || 'uv-release-monorepo' }}
      - name: Build packages
        env:
          GH_TOKEN: ${{ github.token }}
          UVR_PLAN: ${{ inputs.plan }}
        run: uvr-steps build-all --plan "$UVR_PLAN" --runner '${{ matrix.runner }}'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runner }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    if: ${{ always() && !failure() && !contains(fromJSON(inputs.plan).skip, 'publish') }}
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).publish_matrix }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
          run-id: ${{ fromJSON(inputs.plan).reuse_run_id != '' && fromJSON(inputs.plan).reuse_run_id || github.run_id }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: ${{ matrix.title }}
          body: ${{ matrix.body }}
          files: dist/${{ matrix.dist_name }}-${{ matrix.version }}*.whl
          make_latest: ${{ matrix.make_latest }}

  finalize:
    if: ${{ always() && !failure() && !contains(fromJSON(inputs.plan).skip, 'finalize') }}
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Set up
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          uv tool install ${{ fromJSON(inputs.plan).uvr_version != '' && format('uv-release-monorepo=={0}', fromJSON(inputs.plan).uvr_version) || 'uv-release-monorepo' }}
      - name: Finalize release
        env:
          UVR_PLAN: ${{ inputs.plan }}
        run: uvr-steps finalize --plan "$UVR_PLAN"

